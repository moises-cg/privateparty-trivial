<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRIVIAL FDF</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --red: #dc2626;
    --red-dark: #7f1d1d;
    --red-glow: rgba(255,0,0,0.3);
    --red-border: rgba(127,29,29,0.4);
    --red-light: #f87171;
    --correct: #39ff14;
    --correct-glow: rgba(57,255,20,0.15);
    --incorrect: #ef4444;
    --incorrect-glow: rgba(239,68,68,0.15);
    --neon-pink: #ff2d7b;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffe600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Subtle red ambient glow */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: float 10s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: #dc2626; top: -100px; right: -80px; }
  .orb-2 { width: 250px; height: 250px; background: #991b1b; bottom: -80px; left: -60px; animation-delay: -4s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -15px) scale(1.05); }
    66% { transform: translate(-15px, 10px) scale(0.95); }
  }

  /* Container */
  .game-container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  @media (min-width: 640px) {
    .game-container {
      max-width: 520px;
      padding: 24px 20px;
    }
  }

  /* ==================== SCREENS ==================== */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ==================== LANDING ==================== */
  .landing-logo {
    margin-bottom: 8px;
    position: relative;
  }

  .landing-logo::before {
    content: '';
    position: absolute;
    inset: -40px;
    background: rgba(0,0,0,0.8);
    filter: blur(60px);
    border-radius: 50%;
    z-index: -1;
  }

  .landing-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 16vw, 8rem);
    line-height: 0.85;
    text-align: center;
    letter-spacing: 4px;
    position: relative;
  }

  .landing-title .line-1 {
    display: block;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
    font-size: 0.45em;
    letter-spacing: 14px;
    opacity: 0;
    animation: slideDown 0.8s ease forwards 0.3s;
  }

  .landing-title .line-2 {
    display: block;
    color: var(--red);
    text-shadow: 0 0 30px var(--red-glow), 0 0 60px rgba(255,0,0,0.15);
    opacity: 0;
    animation: scaleIn 0.6s ease forwards 0.7s;
  }

  .landing-subtitle {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1s;
  }

  .deco-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.9s;
  }

  /* Form — privateparty style */
  .landing-form {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1.2s;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 6px rgba(255,255,255,0.5);
  }

  .form-input {
    width: 100%;
    min-height: 48px;
    background: rgba(0,0,0,0.8);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    color: #fff;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    -webkit-appearance: none;
  }

  .form-input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  .form-input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red), 0 0 12px rgba(255,0,0,0.15);
  }

  /* Autofill */
  .form-input:-webkit-autofill,
  .form-input:-webkit-autofill:hover,
  .form-input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 1000px rgba(0,0,0,0.9) inset !important;
    -webkit-text-fill-color: white !important;
    caret-color: white !important;
    transition: background-color 5000s ease-in-out 0s;
  }

  .form-error {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--red-light);
    text-shadow: 0 0 8px rgba(255,100,100,0.5);
    display: none;
  }

  .form-error.show { display: block; }

  /* Play button — privateparty red style */
  .btn-play {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 5px;
    padding: 14px 48px;
    margin-top: 4px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px var(--red-glow);
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-play:hover {
    background: #ef4444;
    box-shadow: 0 0 25px rgba(255,0,0,0.4);
  }

  .btn-play:active {
    transform: scale(0.97);
    background: #b91c1c;
  }

  /* Already played */
  .already-played {
    text-align: center;
    padding: 24px;
    display: none;
  }

  .already-played.show {
    display: block;
    animation: fadeIn 0.6s ease forwards;
    opacity: 0;
  }

  .already-played-icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
  }

  .already-played-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red);
    text-shadow: 0 0 10px var(--red-glow);
    margin-bottom: 12px;
  }

  .already-played-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.35);
    line-height: 1.5;
  }

  /* ==================== ANIMATIONS ==================== */
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes feedbackIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes secretReveal {
    from { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(10px); }
    to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  @keyframes wave {
    0%, 100% { transform: perspective(300px) rotateY(-3deg) skewY(0.5deg); }
    25% { transform: perspective(300px) rotateY(3deg) skewY(-1deg); }
    50% { transform: perspective(300px) rotateY(-2deg) skewY(0.8deg); }
    75% { transform: perspective(300px) rotateY(4deg) skewY(-0.5deg); }
  }

  @keyframes flicker {
    0%   { opacity: 0.95; }
    2%   { opacity: 0.85; }
    4%   { opacity: 1; }
    8%   { opacity: 0.92; }
    9%   { opacity: 1; }
    20%  { opacity: 0.7; }
    21%  { opacity: 0.9; }
    22%  { opacity: 1; }
    46%  { opacity: 0.6; }
    47%  { opacity: 0.85; }
    48%  { opacity: 1; }
    80%  { opacity: 0.75; }
    81%  { opacity: 0.95; }
    82%  { opacity: 1; }
    98%  { opacity: 0.65; }
    99%  { opacity: 0.9; }
    100% { opacity: 1; }
  }

  .flicker {
    animation: flicker 4s linear infinite;
  }

  /* ==================== QUESTION SCREEN ==================== */
  .question-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
    align-self: flex-start;
    text-transform: uppercase;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 1px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    border-radius: 1px;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px var(--red-glow);
  }

  .question-card {
    width: 100%;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 28px 20px;
    backdrop-filter: blur(20px);
    animation: cardIn 0.5s ease;
  }

  @media (min-width: 640px) {
    .question-card {
      padding: 36px 28px;
    }
  }

  .question-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    letter-spacing: 1px;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 28px;
    color: #fff;
  }

  .options-grid {
    display: grid;
    gap: 10px;
    width: 100%;
  }

  .options-grid.two-col {
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .options-grid.four-col {
    grid-template-columns: 1fr 1fr;
  }

  .btn-option {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    transition: all 0.25s ease;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }

  @media (min-width: 640px) {
    .btn-option {
      font-size: 1rem;
      padding: 16px 20px;
    }
  }

  .btn-option:hover:not(.disabled) {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-1px);
  }

  .btn-option:active:not(.disabled) {
    transform: scale(0.97);
  }

  .btn-option.correct {
    background: rgba(57,255,20,0.08);
    border-color: var(--correct);
    color: var(--correct);
    box-shadow: 0 0 15px var(--correct-glow);
  }

  .btn-option.incorrect {
    background: rgba(239,68,68,0.08);
    border-color: var(--incorrect);
    color: var(--incorrect);
    box-shadow: 0 0 15px var(--incorrect-glow);
  }

  .btn-option.disabled {
    cursor: default;
    opacity: 0.35;
  }

  .btn-option.disabled.correct {
    opacity: 1;
  }

  /* Feedback */
  .feedback {
    width: 100%;
    margin-top: 16px;
    padding: 20px;
    border-radius: 10px;
    animation: feedbackIn 0.4s ease;
    display: none;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(57,255,20,0.04);
    border: 1px solid rgba(57,255,20,0.15);
  }

  .feedback.incorrect-fb {
    background: rgba(239,68,68,0.04);
    border: 1px solid rgba(239,68,68,0.15);
  }

  .feedback-verdict {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .feedback.correct-fb .feedback-verdict { color: var(--correct); text-shadow: 0 0 8px var(--correct-glow); }
  .feedback.incorrect-fb .feedback-verdict { color: var(--incorrect); text-shadow: 0 0 8px var(--incorrect-glow); }

  .feedback-text {
    font-size: 0.85rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
  }

  .btn-next {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px 40px;
    margin-top: 24px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-next.show { display: inline-block; }

  .btn-next:hover {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 12px rgba(255,0,0,0.15);
  }

  .btn-next:active { transform: scale(0.97); }

  /* ==================== RESULTS ==================== */
  .results-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 20vw, 9rem);
    line-height: 1;
    color: var(--red);
    text-shadow: 0 0 40px var(--red-glow), 0 0 80px rgba(255,0,0,0.1);
    animation: scaleIn 0.6s ease;
  }

  .results-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 12px;
  }

  .results-message {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
    text-align: center;
    max-width: 300px;
    line-height: 1.6;
  }

  .results-email {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    margin-top: 24px;
    letter-spacing: 1px;
  }

  /* ==================== COUNTDOWN & SECRET ==================== */
  .countdown-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(7rem, 28vw, 12rem);
    line-height: 1;
    color: var(--red);
    text-shadow: 0 0 50px var(--red-glow), 0 0 100px rgba(255,0,0,0.15);
    animation: pulse 0.8s ease-in-out infinite;
  }

  .countdown-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 20px;
  }

  .secret-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--red);
    text-shadow: 0 0 12px var(--red-glow);
    margin-bottom: 8px;
    animation: fadeIn 0.6s ease;
  }

  .secret-warning {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    color: rgba(255,255,255,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: fadeIn 0.8s ease;
  }

  .secret-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    letter-spacing: 2px;
    text-align: center;
    color: #fff;
    line-height: 1.3;
    max-width: 440px;
    animation: secretReveal 1s ease;
    margin-bottom: 28px;
  }

  .flag-container {
    position: relative;
    width: 160px;
    height: 107px;
    margin-bottom: 32px;
    animation: secretReveal 1.2s ease;
  }

  @media (min-width: 640px) {
    .flag-container { width: 200px; height: 133px; }
  }

  .flag {
    width: 100%;
    height: 100%;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    animation: wave 2s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(220,38,38,0.2);
  }

  .flag-stripe { width: 100%; height: 33.33%; }
  .flag-stripe.white { background: #fff; }
  .flag-stripe.blue { background: #003DA5; }
  .flag-stripe.yellow { background: #FFD700; }

  .flag-pole {
    position: absolute;
    left: -6px;
    top: -10px;
    width: 4px;
    height: calc(100% + 20px);
    background: linear-gradient(to bottom, #ccc, #888);
    border-radius: 2px;
  }

  .flag-pole-top {
    position: absolute;
    left: -9px;
    top: -16px;
    width: 10px;
    height: 10px;
    background: #FFD700;
    border-radius: 50%;
  }

  /* Confetti */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="confetti"></canvas>

<div class="game-container">

  <!-- LANDING -->
  <div id="landing" class="screen active">
    <div class="landing-logo flicker">
      <h1 class="landing-title">
        <span class="line-1">TRIVIAL</span>
        <span class="line-2">FDF</span>
      </h1>
    </div>
    <div class="deco-line"></div>
    <p class="landing-subtitle">Festival de Fiestas</p>

    <form class="landing-form" id="landing-form" onsubmit="handleLandingSubmit(event)">
      <div class="form-group">
        <label class="form-label" for="email-input">Correo electr&oacute;nico</label>
        <input
          class="form-input"
          id="email-input"
          type="email"
          placeholder="tu@email.com"
          autocomplete="email"
          inputmode="email"
          required
        >
        <span class="form-error" id="email-error"></span>
      </div>
      <button class="btn-play" type="submit">JUGAR</button>
    </form>

    <div class="already-played" id="already-played">
      <div class="already-played-icon">🔒</div>
      <div class="already-played-text">Ya has jugado</div>
      <p class="already-played-sub">Solo se puede jugar una vez por correo.<br>¡Gracias por participar!</p>
    </div>
  </div>

  <!-- QUESTION -->
  <div id="question-screen" class="screen">
    <div class="question-counter" id="counter"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="question-card">
      <h2 class="question-text" id="question-text"></h2>
      <div class="options-grid" id="options-grid"></div>
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-verdict" id="feedback-verdict"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">SIGUIENTE</button>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="results-label">Puntuaci&oacute;n</div>
    <div class="results-score" id="results-score"></div>
    <p class="results-message" id="results-message"></p>
    <div class="results-email" id="results-email"></div>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown-screen" class="screen">
    <div class="countdown-label">Pista en...</div>
    <div class="countdown-number" id="countdown-number">5</div>
  </div>

  <!-- SECRET -->
  <div id="secret-screen" class="screen">
    <div class="secret-title">Pista secreta</div>
    <p class="secret-warning">No se la cuentes a nadie</p>
    <div class="flag-container">
      <div class="flag-pole"></div>
      <div class="flag-pole-top"></div>
      <div class="flag">
        <div class="flag-stripe white"></div>
        <div class="flag-stripe blue"></div>
        <div class="flag-stripe yellow"></div>
      </div>
    </div>
    <div class="secret-text" id="secret-text"></div>
  </div>

</div>

<script>
const questions = [
  {
    text: "¿HA ESTADO SAIKO EN FDF?",
    options: ["Sí", "No"],
    correct: 0,
    layout: "two-col",
    explanation: "¡Correcto! En diciembre de 2022 se celebró una fiesta «La Última by FDF» en la que estuvieron Ptazeta, Saiko y Juacko."
  },
  {

    layout: "four-col",
    explanation: "Ballesteros nunca ha actuado en FDF. Quevedo sí pisó el escenario en 2022."
  },

    options: ["Sí", "No"],
    correct: 0,
    layout: "two-col",
    explanation: "¡Sí! MVRK apareció como invitado sorpresa con Raúl Clyde en 2024."
  },
  {
    text: "¿QUÉ LLEVABA PUESTO OMAR MONTES CUANDO SALIÓ A FESTIVAL DE FIESTAS EN 2022 (1ª EDICIÓN)?",
    options: ["Un pasamontañas", "Una riñonera", "Un cocodrilo dorado", "Un oso de peluche"],
    correct: 0,

    explanation: "Omar Montes salió al escenario de la primera edición de FDF en 2022 llevando un pasamontañas durante las 2 primeras canciones."

const STORAGE_KEY = 'trivial_fdf_played';
let currentQ = 0;
let score = 0;
let answered = false;
let playerEmail = '';

function hasPlayed(email) {
  const played = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  return played.includes(email.trim().toLowerCase());
}

function markPlayed(email) {
  const played = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const normalized = email.trim().toLowerCase();
  if (!played.includes(normalized)) {
    played.push(normalized);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(played));
  }
}

function handleLandingSubmit(e) {
  e.preventDefault();
  const input = document.getElementById('email-input');
  const errorEl = document.getElementById('email-error');
  const email = input.value.trim().toLowerCase();

  if (!email) {
    errorEl.textContent = 'Introduce tu correo electrónico';
    errorEl.classList.add('show');
    return;
  }
  if (!/^[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$/.test(email)) {
    errorEl.textContent = 'Introduce un correo válido';
    errorEl.classList.add('show');
    return;
  }

  errorEl.classList.remove('show');

  if (hasPlayed(email)) {
    document.getElementById('landing-form').style.display = 'none';
    document.getElementById('already-played').classList.add('show');
    return;
  }

  playerEmail = email;
  startGame();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentQ = 0;
  score = 0;
  answered = false;
  showScreen('question-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('counter').textContent = `PREGUNTA ${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;
  document.getElementById('question-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.className = 'options-grid ' + q.layout;
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('show', 'correct-fb', 'incorrect-fb');
  document.getElementById('btn-next').classList.remove('show');

  const card = document.querySelector('.question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const isCorrect = index === q.correct;
  if (isCorrect) score++;

  const buttons = document.querySelectorAll('.btn-option');
  buttons.forEach((btn, i) => {
    if (i === q.correct) btn.classList.add('correct');
    else if (i === index && !isCorrect) btn.classList.add('incorrect');
    if (i !== q.correct && i !== index) btn.classList.add('disabled');
    btn.classList.add('disabled');
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'incorrect-fb');
  document.getElementById('feedback-verdict').textContent = isCorrect ? 'CORRECTO' : 'INCORRECTO';
  document.getElementById('feedback-text').textContent = q.explanation;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ < questions.length - 1 ? 'SIGUIENTE' : 'VER RESULTADO';
  nextBtn.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  markPlayed(playerEmail);
  const pct = score / questions.length;

  if (pct === 1) {
    launchConfetti();
    showCountdown();
  } else {
    showScreen('results');
    document.getElementById('progress').style.width = '100%';
    document.getElementById('results-score').textContent = `${score}/${questions.length}`;

    let msg = '';
    if (pct >= 0.5) msg = '¡No está mal! Pero necesitas acertarlas TODAS para desbloquear la pista secreta.';
    else msg = 'Necesitas venir a más ediciones de FDF... Aciértalas todas para ver la pista secreta.';

    document.getElementById('results-message').textContent = msg;
    document.getElementById('results-email').textContent = playerEmail;
    if (pct >= 0.5) launchConfetti();
  }
}

function showCountdown() {
  showScreen('countdown-screen');
  let count = 5;
  const el = document.getElementById('countdown-number');
  el.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      el.textContent = count;
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    } else if (count === 0) {
      el.textContent = '¿LISTO?';
      el.style.fontSize = 'clamp(2rem, 10vw, 4rem)';
    } else {
      clearInterval(interval);
      el.style.fontSize = '';
      showSecret();
    }
  }, 1000);
}

function showSecret() {
  showScreen('secret-screen');
  const fullText = 'Y PONES UNA BANDERA DE CANARIAS ONDEANDO';
  const el = document.getElementById('secret-text');
  el.textContent = '';
  let i = 0;
  const typeInterval = setInterval(() => {
    el.textContent += fullText[i];
    i++;
    if (i >= fullText.length) clearInterval(typeInterval);
  }, 50);
  launchConfetti();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#dc2626', '#ef4444', '#fff', '#fca5a5', '#7f1d1d'];
  const pieces = [];

  for (let i = 0; i < 100; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 8 + 3,
      h: Math.random() * 5 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 8,
      opacity: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    pieces.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.vr;
      if (frame > 90) p.opacity -= 0.015;

      if (p.opacity > 0 && p.y < canvas.height + 20) {
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
    });

    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  draw();
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
