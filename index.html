<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIVIAL FDF</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-pink: #ff2d7b;
    --neon-cyan: #00f0ff;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --dark-bg: #0a0a12;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --correct: #39ff14;
    --incorrect: #ff2d7b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--dark-bg);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Floating neon orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--neon-pink); top: -100px; right: -80px; animation-delay: 0s; }
  .orb-2 { width: 250px; height: 250px; background: var(--neon-cyan); bottom: -80px; left: -60px; animation-delay: -3s; }
  .orb-3 { width: 200px; height: 200px; background: var(--neon-yellow); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -5s; opacity: 0.15; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }

  /* Container */
  .game-container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* ==================== WELCOME SCREEN ==================== */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  .welcome-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 15vw, 8rem);
    line-height: 0.9;
    text-align: center;
    letter-spacing: 4px;
    position: relative;
    margin-bottom: 12px;
  }

  .welcome-title .line-1 {
    display: block;
    color: #fff;
    text-shadow:
      0 0 20px rgba(255,255,255,0.3),
      0 0 60px rgba(255,255,255,0.1);
    font-size: 0.5em;
    letter-spacing: 12px;
    opacity: 0;
    animation: slideDown 0.8s ease forwards 0.3s;
  }

  .welcome-title .line-2 {
    display: block;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,45,123,0.4)) drop-shadow(0 0 60px rgba(0,240,255,0.3));
    opacity: 0;
    animation: scaleIn 0.6s ease forwards 0.7s;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .welcome-subtitle {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1.1s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Glitch line decoration */
  .deco-line {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1s;
  }

  /* Play button */
  .btn-play {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 6px;
    padding: 18px 64px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.4s;
  }

  .btn-play::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-cyan);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-play:hover {
    color: var(--dark-bg);
    text-shadow: none;
    box-shadow: 0 0 30px rgba(0,240,255,0.4), 0 0 60px rgba(0,240,255,0.2);
  }

  .btn-play:hover::before {
    transform: translateX(0);
  }

  /* ==================== QUESTION SCREEN ==================== */
  .question-counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 8px;
    align-self: flex-start;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    margin-bottom: 48px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
  }

  .question-card {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 40px 32px;
    backdrop-filter: blur(20px);
    animation: cardIn 0.5s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .question-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    letter-spacing: 1px;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 36px;
    color: #fff;
  }

  .options-grid {
    display: grid;
    gap: 12px;
    width: 100%;
  }

  .options-grid.two-col {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .options-grid.four-col {
    grid-template-columns: 1fr 1fr;
  }

  .btn-option {
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    padding: 16px 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-option:hover:not(.disabled) {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .btn-option.correct {
    background: rgba(57,255,20,0.12);
    border-color: var(--correct);
    color: var(--correct);
    box-shadow: 0 0 20px rgba(57,255,20,0.15);
  }

  .btn-option.incorrect {
    background: rgba(255,45,123,0.12);
    border-color: var(--incorrect);
    color: var(--incorrect);
    box-shadow: 0 0 20px rgba(255,45,123,0.15);
  }

  .btn-option.disabled {
    cursor: default;
    opacity: 0.4;
  }

  .btn-option.disabled.correct {
    opacity: 1;
  }

  /* Feedback panel */
  .feedback {
    width: 100%;
    margin-top: 20px;
    padding: 24px;
    border-radius: 12px;
    animation: feedbackIn 0.4s ease;
    display: none;
  }

  .feedback.show { display: block; }

  @keyframes feedbackIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feedback.correct-fb {
    background: rgba(57,255,20,0.06);
    border: 1px solid rgba(57,255,20,0.2);
  }

  .feedback.incorrect-fb {
    background: rgba(255,45,123,0.06);
    border: 1px solid rgba(255,45,123,0.2);
  }

  .feedback-verdict {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .feedback.correct-fb .feedback-verdict { color: var(--correct); }
  .feedback.incorrect-fb .feedback-verdict { color: var(--incorrect); }

  .feedback-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: rgba(255,255,255,0.7);
  }

  .btn-next {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 4px;
    padding: 14px 48px;
    margin-top: 32px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
  }

  .btn-next.show { display: inline-block; }

  .btn-next:hover {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,240,255,0.15);
  }

  /* ==================== RESULTS SCREEN ==================== */
  .results-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 20vw, 9rem);
    line-height: 1;
    background: linear-gradient(135deg, var(--neon-yellow), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,230,0,0.3));
    animation: scaleIn 0.6s ease;
  }

  .results-label {
    font-size: 0.9rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 12px;
  }

  .results-message {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 48px;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }

  .btn-replay {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 5px;
    padding: 16px 56px;
    background: transparent;
    border: 2px solid var(--neon-pink);
    color: var(--neon-pink);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .btn-replay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--neon-pink);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-replay:hover {
    color: #fff;
    box-shadow: 0 0 30px rgba(255,45,123,0.4);
  }

  .btn-replay:hover::before {
    transform: translateX(0);
  }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="confetti"></canvas>

<div class="game-container">

  <!-- WELCOME -->
  <div id="welcome" class="screen active">
    <h1 class="welcome-title">
      <span class="line-1">TRIVIAL</span>
      <span class="line-2">FDF</span>
    </h1>
    <div class="deco-line"></div>
    <p class="welcome-subtitle">Festival de Fiestas</p>
    <button class="btn-play" onclick="startGame()">JUGAR</button>
  </div>

  <!-- QUESTION -->
  <div id="question-screen" class="screen">
    <div class="question-counter" id="counter"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="question-card">
      <h2 class="question-text" id="question-text"></h2>
      <div class="options-grid" id="options-grid"></div>
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-verdict" id="feedback-verdict"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">SIGUIENTE</button>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="results-label">PUNTUACI&Oacute;N</div>
    <div class="results-score" id="results-score"></div>
    <p class="results-message" id="results-message"></p>
    <button class="btn-replay" onclick="restartGame()">JUGAR DE NUEVO</button>
  </div>

</div>

<script>
const questions = [
  {
    text: "¿HA ESTADO SAIKO EN FDF?",
    options: ["Sí", "No"],
    correct: 0,
    layout: "two-col",
    explanation: "¡Correcto! En diciembre de 2022 se celebró una fiesta «La Última by FDF» en la que estuvieron Ptazeta, Saiko y Juacko."
  },
  {
    text: "¿CUÁL DE ESTOS ARTISTAS NO HA PISADO EL ESCENARIO DE FESTIVAL DE FIESTAS?",
    options: ["Quevedo", "Jhayco", "JC Reyes", "Ballesteros"],
    correct: 3,
    layout: "four-col",
    explanation: "Ballesteros nunca ha actuado en FDF. Quevedo sí pisó el escenario en 2022."
  }
];

let currentQ = 0;
let score = 0;
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentQ = 0;
  score = 0;
  answered = false;
  showScreen('question-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('counter').textContent = `PREGUNTA ${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;

  document.getElementById('question-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.className = 'options-grid ' + q.layout;
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  // Reset feedback & next
  const fb = document.getElementById('feedback');
  fb.classList.remove('show', 'correct-fb', 'incorrect-fb');
  document.getElementById('btn-next').classList.remove('show');

  // Re-trigger card animation
  const card = document.querySelector('.question-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const isCorrect = index === q.correct;
  if (isCorrect) score++;

  const buttons = document.querySelectorAll('.btn-option');
  buttons.forEach((btn, i) => {
    if (i === q.correct) {
      btn.classList.add('correct');
    } else if (i === index && !isCorrect) {
      btn.classList.add('incorrect');
    }
    if (i !== q.correct && i !== index) {
      btn.classList.add('disabled');
    }
    btn.classList.add('disabled');
  });

  // Show feedback
  const fb = document.getElementById('feedback');
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'incorrect-fb');
  document.getElementById('feedback-verdict').textContent = isCorrect ? '✓ CORRECTO' : '✗ INCORRECTO';
  document.getElementById('feedback-text').textContent = q.explanation;

  // Show next button
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ < questions.length - 1 ? 'SIGUIENTE' : 'VER RESULTADO';
  nextBtn.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  showScreen('results');
  document.getElementById('progress').style.width = '100%';
  document.getElementById('results-score').textContent = `${score}/${questions.length}`;

  let msg = '';
  const pct = score / questions.length;
  if (pct === 1) msg = '¡Increíble! Lo sabes TODO sobre FDF. Eres una leyenda.';
  else if (pct >= 0.5) msg = '¡No está mal! Pero aún te queda por descubrir sobre FDF.';
  else msg = 'Necesitas venir a más ediciones de FDF...';

  document.getElementById('results-message').textContent = msg;

  if (pct >= 0.5) launchConfetti();
}

function restartGame() {
  startGame();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff2d7b', '#00f0ff', '#ffe600', '#39ff14', '#a29bfe', '#fff'];
  const pieces = [];

  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 8,
      opacity: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    pieces.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.vr;
      if (frame > 90) p.opacity -= 0.015;

      if (p.opacity > 0 && p.y < canvas.height + 20) {
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
    });

    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  draw();
}

window.addEventListener('resize', () => {
  const canvas = document.getElementById('confetti');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
