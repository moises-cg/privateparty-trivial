<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIVIAL FDF</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c41c1c;
    --red-bright: #ff2a2a;
    --red-glow: rgba(196,28,28,0.6);
    --red-dim: #4a0a0a;
    --dark-bg: #0a0000;
    --card-bg: rgba(196,28,28,0.04);
    --card-border: rgba(196,28,28,0.15);
    --correct: #00ff41;
    --incorrect: #ff2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--dark-bg);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* Matrix rain canvas */
  #matrix-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.4;
  }

  /* Red glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
    animation: float 10s ease-in-out infinite;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--red); top: -150px; right: -100px; }
  .orb-2 { width: 350px; height: 350px; background: #8b0000; bottom: -100px; left: -80px; animation-delay: -4s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -15px) scale(1.05); }
  }

  /* Container */
  .game-container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  /* ==================== SCREENS ==================== */
  .screen { display: none; width: 100%; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ==================== WELCOME ==================== */
  .welcome-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(3.5rem, 14vw, 7rem);
    font-weight: 900;
    line-height: 0.9;
    text-align: center;
    letter-spacing: 4px;
    position: relative;
    margin-bottom: 12px;
  }

  .welcome-title .line-1 {
    display: block;
    color: var(--red-bright);
    text-shadow:
      0 0 10px var(--red-glow),
      0 0 40px var(--red-glow),
      0 0 80px rgba(196,28,28,0.3);
    font-size: 0.45em;
    letter-spacing: 14px;
    opacity: 0;
    animation: glitchIn 0.8s ease forwards 0.3s;
  }

  .welcome-title .line-2 {
    display: block;
    color: var(--red-bright);
    text-shadow:
      0 0 10px var(--red-glow),
      0 0 40px var(--red-glow),
      0 0 80px rgba(196,28,28,0.3),
      0 0 120px rgba(196,28,28,0.15);
    opacity: 0;
    animation: glitchIn 0.6s ease forwards 0.7s;
  }

  @keyframes glitchIn {
    0% { opacity: 0; transform: translateX(-20px) skewX(-5deg); filter: blur(4px); }
    50% { opacity: 0.8; transform: translateX(10px) skewX(2deg); filter: blur(0); }
    70% { opacity: 0.6; transform: translateX(-5px) skewX(-1deg); }
    100% { opacity: 1; transform: translateX(0) skewX(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
  }

  .welcome-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: rgba(196,28,28,0.5);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards 1.1s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .deco-line {
    width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1s;
    position: relative;
  }

  .deco-line::after {
    content: '///';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--red-dim);
    font-size: 0.7rem;
    letter-spacing: 4px;
  }

  /* Play button */
  .btn-play {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 6px;
    padding: 18px 64px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red-bright);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeIn 0.6s ease forwards 1.4s;
    text-shadow: 0 0 10px var(--red-glow);
  }

  .btn-play::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-play:hover {
    color: #fff;
    text-shadow: none;
    box-shadow: 0 0 30px var(--red-glow), inset 0 0 30px rgba(196,28,28,0.1);
  }

  .btn-play:hover::before {
    transform: translateX(0);
  }

  /* Terminal blink cursor */
  .cursor-blink {
    display: inline-block;
    width: 10px;
    height: 2px;
    background: var(--red-bright);
    margin-left: 4px;
    animation: blink 1s step-end infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ==================== QUESTION ==================== */
  .question-counter {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: rgba(196,28,28,0.4);
    margin-bottom: 8px;
    align-self: flex-start;
  }

  .question-counter::before {
    content: '> ';
    color: var(--red);
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: rgba(196,28,28,0.1);
    margin-bottom: 48px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    transition: width 0.5s ease;
    box-shadow: 0 0 10px var(--red-glow);
  }

  .question-card {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 40px 32px;
    backdrop-filter: blur(20px);
    animation: cardIn 0.5s ease;
    position: relative;
  }

  .question-card::before {
    content: 'CLASSIFIED';
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: rgba(196,28,28,0.25);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    letter-spacing: 1px;
    line-height: 1.4;
    text-align: center;
    margin-bottom: 36px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
  }

  .options-grid {
    display: grid;
    gap: 12px;
    width: 100%;
  }

  .options-grid.two-col {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .options-grid.four-col {
    grid-template-columns: 1fr 1fr;
  }

  .btn-option {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 16px 24px;
    background: rgba(196,28,28,0.05);
    border: 1px solid rgba(196,28,28,0.2);
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
  }

  .btn-option::before {
    content: '[ ';
    color: var(--red-dim);
  }

  .btn-option::after {
    content: ' ]';
    color: var(--red-dim);
  }

  .btn-option:hover:not(.disabled) {
    background: rgba(196,28,28,0.15);
    border-color: var(--red);
    color: #fff;
    text-shadow: 0 0 10px var(--red-glow);
    box-shadow: 0 0 20px rgba(196,28,28,0.1);
  }

  .btn-option.correct {
    background: rgba(0,255,65,0.08);
    border-color: var(--correct);
    color: var(--correct);
    box-shadow: 0 0 20px rgba(0,255,65,0.15);
    text-shadow: 0 0 10px rgba(0,255,65,0.5);
  }

  .btn-option.correct::before,
  .btn-option.correct::after { color: rgba(0,255,65,0.4); }

  .btn-option.incorrect {
    background: rgba(255,42,42,0.08);
    border-color: var(--incorrect);
    color: var(--incorrect);
    box-shadow: 0 0 20px rgba(255,42,42,0.15);
  }

  .btn-option.incorrect::before,
  .btn-option.incorrect::after { color: rgba(255,42,42,0.4); }

  .btn-option.disabled {
    cursor: default;
    opacity: 0.3;
  }

  .btn-option.disabled.correct {
    opacity: 1;
  }

  /* Feedback */
  .feedback {
    width: 100%;
    margin-top: 20px;
    padding: 24px;
    animation: feedbackIn 0.4s ease;
    display: none;
    border-left: 2px solid;
  }

  .feedback.show { display: block; }

  @keyframes feedbackIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .feedback.correct-fb {
    background: rgba(0,255,65,0.03);
    border-left-color: var(--correct);
  }

  .feedback.incorrect-fb {
    background: rgba(255,42,42,0.03);
    border-left-color: var(--incorrect);
  }

  .feedback-verdict {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .feedback.correct-fb .feedback-verdict { color: var(--correct); }
  .feedback.incorrect-fb .feedback-verdict { color: var(--incorrect); }

  .feedback-text {
    font-size: 0.85rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.55);
  }

  .btn-next {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 3px;
    padding: 14px 48px;
    margin-top: 32px;
    background: transparent;
    border: 1px solid rgba(196,28,28,0.25);
    color: rgba(196,28,28,0.6);
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
    text-transform: uppercase;
  }

  .btn-next.show { display: inline-block; }

  .btn-next:hover {
    border-color: var(--red);
    color: var(--red-bright);
    box-shadow: 0 0 20px rgba(196,28,28,0.15);
    text-shadow: 0 0 10px var(--red-glow);
  }

  /* ==================== RESULTS ==================== */
  .results-score {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(5rem, 20vw, 9rem);
    line-height: 1;
    color: var(--red-bright);
    text-shadow:
      0 0 20px var(--red-glow),
      0 0 60px var(--red-glow),
      0 0 100px rgba(196,28,28,0.2);
    animation: scaleIn 0.6s ease;
  }

  .results-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(196,28,28,0.4);
    margin-bottom: 12px;
  }

  .results-label::before { content: '>> '; }

  .results-message {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.45);
    margin-bottom: 48px;
    text-align: center;
    max-width: 360px;
    line-height: 1.6;
  }

  .btn-replay {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 4px;
    padding: 16px 56px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red-bright);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  .btn-replay::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-replay:hover {
    color: #fff;
    box-shadow: 0 0 30px var(--red-glow);
  }

  .btn-replay:hover::before {
    transform: translateX(0);
  }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ==================== SECRET / COUNTDOWN ==================== */
  .countdown-number {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(8rem, 30vw, 14rem);
    line-height: 1;
    color: var(--red-bright);
    text-shadow:
      0 0 20px var(--red-glow),
      0 0 60px var(--red-glow),
      0 0 120px rgba(196,28,28,0.3);
    animation: pulse 0.8s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .countdown-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 6px;
    color: rgba(196,28,28,0.5);
    margin-bottom: 24px;
  }

  .secret-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    letter-spacing: 5px;
    color: var(--red-bright);
    text-shadow: 0 0 20px var(--red-glow);
    margin-bottom: 8px;
    animation: fadeIn 0.6s ease;
  }

  .secret-warning {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: rgba(196,28,28,0.35);
    letter-spacing: 3px;
    margin-bottom: 32px;
    animation: blink 2s step-end infinite;
  }

  .secret-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    letter-spacing: 2px;
    text-align: center;
    color: var(--correct);
    text-shadow: 0 0 15px rgba(0,255,65,0.4);
    line-height: 1.5;
    max-width: 500px;
    animation: secretReveal 1s ease;
    margin-bottom: 32px;
  }

  @keyframes secretReveal {
    from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .flag-container {
    position: relative;
    width: 200px;
    height: 133px;
    margin-bottom: 40px;
    animation: secretReveal 1.2s ease;
  }

  .flag {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
    animation: wave 2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(196,28,28,0.2);
    border: 1px solid rgba(196,28,28,0.3);
  }

  @keyframes wave {
    0%, 100% { transform: perspective(300px) rotateY(-3deg) skewY(0.5deg); }
    25% { transform: perspective(300px) rotateY(3deg) skewY(-1deg); }
    50% { transform: perspective(300px) rotateY(-2deg) skewY(0.8deg); }
    75% { transform: perspective(300px) rotateY(4deg) skewY(-0.5deg); }
  }

  .flag-stripe { width: 100%; height: 33.33%; }
  .flag-stripe.white { background: #fff; }
  .flag-stripe.blue { background: #003DA5; }
  .flag-stripe.yellow { background: #FFD700; }

  .flag-pole {
    position: absolute;
    left: -6px;
    top: -10px;
    width: 4px;
    height: calc(100% + 20px);
    background: linear-gradient(to bottom, #666, #333);
  }

  .flag-pole-top {
    position: absolute;
    left: -9px;
    top: -16px;
    width: 10px;
    height: 10px;
    background: var(--red);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--red-glow);
  }

  .btn-secret-back {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 3px;
    padding: 14px 48px;
    background: transparent;
    border: 1px solid rgba(196,28,28,0.2);
    color: rgba(196,28,28,0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  .btn-secret-back:hover {
    border-color: var(--red);
    color: var(--red-bright);
    text-shadow: 0 0 10px var(--red-glow);
  }
</style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="confetti"></canvas>

<div class="game-container">

  <!-- WELCOME -->
  <div id="welcome" class="screen active">
    <h1 class="welcome-title">
      <span class="line-1">TRIVIAL</span>
      <span class="line-2">FDF</span>
    </h1>
    <div class="deco-line"></div>
    <p class="welcome-subtitle">// festival de fiestas <span class="cursor-blink"></span></p>
    <button class="btn-play" onclick="startGame()">ACCEDER</button>
  </div>

  <!-- QUESTION -->
  <div id="question-screen" class="screen">
    <div class="question-counter" id="counter"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="question-card">
      <h2 class="question-text" id="question-text"></h2>
      <div class="options-grid" id="options-grid"></div>
    </div>
    <div class="feedback" id="feedback">
      <div class="feedback-verdict" id="feedback-verdict"></div>
      <div class="feedback-text" id="feedback-text"></div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">[ siguiente ]</button>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <div class="results-label">puntuacion</div>
    <div class="results-score" id="results-score"></div>
    <p class="results-message" id="results-message"></p>
    <button class="btn-replay" onclick="restartGame()">[ reintentar ]</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown-screen" class="screen">
    <div class="countdown-label">// PISTA EN...</div>
    <div class="countdown-number" id="countdown-number">5</div>
  </div>

  <!-- SECRET -->
  <div id="secret-screen" class="screen">
    <div class="secret-title">PISTA SECRETA</div>
    <p class="secret-warning">// NO SE LA CUENTES A NADIE //</p>
    <div class="flag-container">
      <div class="flag-pole"></div>
      <div class="flag-pole-top"></div>
      <div class="flag">
        <div class="flag-stripe white"></div>
        <div class="flag-stripe blue"></div>
        <div class="flag-stripe yellow"></div>
      </div>
    </div>
    <div class="secret-text" id="secret-text"></div>
    <button class="btn-secret-back" onclick="restartGame()">[ reintentar ]</button>
  </div>

</div>

<script>
// ==================== MATRIX RAIN BACKGROUND ====================
const matrixCanvas = document.getElementById('matrix-bg');
const matrixCtx = matrixCanvas.getContext('2d');

function resizeMatrix() {
  matrixCanvas.width = window.innerWidth;
  matrixCanvas.height = window.innerHeight;
}
resizeMatrix();

const chars = '01001010110100101010011010010110100101'.split('');
const fontSize = 14;
let columns = Math.floor(matrixCanvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix() {
  matrixCtx.fillStyle = 'rgba(10, 0, 0, 0.06)';
  matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

  matrixCtx.fillStyle = 'rgba(196, 28, 28, 0.35)';
  matrixCtx.font = fontSize + 'px Share Tech Mono';

  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    matrixCtx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

window.addEventListener('resize', () => {
  resizeMatrix();
  columns = Math.floor(matrixCanvas.width / fontSize);
  drops = Array(columns).fill(1);

  const confetti = document.getElementById('confetti');
  confetti.width = window.innerWidth;
  confetti.height = window.innerHeight;
});

// ==================== GAME DATA ====================
const questions = [
  {
    text: "¿HA ESTADO SAIKO EN FDF?",
    options: ["Sí", "No"],
    correct: 0,
    layout: "two-col",
    explanation: "¡Correcto! En diciembre de 2022 se celebró una fiesta «La Última by FDF» en la que estuvieron Ptazeta, Saiko y Juacko."
  },
  {
    text: "¿CUÁL DE ESTOS ARTISTAS NO HA PISADO EL ESCENARIO DE FESTIVAL DE FIESTAS?",
    options: ["Quevedo", "Jhayco", "JC Reyes", "Ballesteros"],
    correct: 3,
    layout: "four-col",
    explanation: "Ballesteros nunca ha actuado en FDF. Quevedo sí pisó el escenario en 2022."
  },
  {
    text: "¿MVRK HA CANTADO EN EL ESCENARIO DE FDF?",
    options: ["Sí", "No"],
    correct: 0,
    layout: "two-col",
    explanation: "¡Sí! MVRK apareció como invitado sorpresa con Raúl Clyde en 2024."
  },
  {
    text: "¿QUÉ LLEVABA PUESTO OMAR MONTES CUANDO SALIÓ A FESTIVAL DE FIESTAS EN 2022 (1ª EDICIÓN)?",
    options: ["Un pasamontañas", "Una riñonera", "Un cocodrilo dorado", "Un oso de peluche"],
    correct: 0,
    layout: "four-col",
    explanation: "Omar Montes salió al escenario de la primera edición de FDF en 2022 llevando un pasamontañas durante las 2 primeras canciones."
  }
];

let currentQ = 0;
let score = 0;
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentQ = 0;
  score = 0;
  answered = false;
  showScreen('question-screen');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[currentQ];

  document.getElementById('counter').textContent = `PREGUNTA ${currentQ + 1} / ${questions.length}`;
  document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;

  document.getElementById('question-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.className = 'options-grid ' + q.layout;
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.classList.remove('show', 'correct-fb', 'incorrect-fb');
  document.getElementById('btn-next').classList.remove('show');

  const card = document.querySelector('.question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const isCorrect = index === q.correct;
  if (isCorrect) score++;

  const buttons = document.querySelectorAll('.btn-option');
  buttons.forEach((btn, i) => {
    if (i === q.correct) {
      btn.classList.add('correct');
    } else if (i === index && !isCorrect) {
      btn.classList.add('incorrect');
    }
    if (i !== q.correct && i !== index) {
      btn.classList.add('disabled');
    }
    btn.classList.add('disabled');
  });

  const fb = document.getElementById('feedback');
  fb.classList.add('show', isCorrect ? 'correct-fb' : 'incorrect-fb');
  document.getElementById('feedback-verdict').textContent = isCorrect ? '> CORRECTO' : '> ERROR';
  document.getElementById('feedback-text').textContent = q.explanation;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = currentQ < questions.length - 1 ? '[ siguiente ]' : '[ ver resultado ]';
  nextBtn.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  const pct = score / questions.length;

  if (pct === 1) {
    launchConfetti();
    showCountdown();
  } else {
    showScreen('results');
    document.getElementById('progress').style.width = '100%';
    document.getElementById('results-score').textContent = `${score}/${questions.length}`;

    let msg = '';
    if (pct >= 0.5) msg = 'Acceso parcial. Necesitas acertarlas TODAS para desbloquear la pista secreta.';
    else msg = 'Acceso denegado. Aciértalas todas para desbloquear la información clasificada.';

    document.getElementById('results-message').textContent = msg;
    if (pct >= 0.5) launchConfetti();
  }
}

function showCountdown() {
  showScreen('countdown-screen');
  let count = 5;
  const el = document.getElementById('countdown-number');
  el.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      el.textContent = count;
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    } else if (count === 0) {
      el.textContent = '¿LISTO?';
      el.style.fontSize = 'clamp(2rem, 10vw, 4rem)';
    } else {
      clearInterval(interval);
      el.style.fontSize = '';
      showSecret();
    }
  }, 1000);
}

function showSecret() {
  showScreen('secret-screen');
  const fullText = 'Y PONES UNA BANDERA DE CANARIAS ONDEANDO';
  const el = document.getElementById('secret-text');
  el.textContent = '';
  let i = 0;
  const typeInterval = setInterval(() => {
    el.textContent += fullText[i];
    i++;
    if (i >= fullText.length) clearInterval(typeInterval);
  }, 50);
  launchConfetti();
}

function restartGame() {
  startGame();
}

// ==================== CONFETTI ====================
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#c41c1c', '#ff2a2a', '#00ff41', '#fff', '#8b0000'];
  const pieces = [];

  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 8,
      opacity: 1
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;

    pieces.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.vr;
      if (frame > 90) p.opacity -= 0.015;

      if (p.opacity > 0 && p.y < canvas.height + 20) {
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rot * Math.PI) / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
    });

    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  draw();
}
</script>
